<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Історія аномалій | Energy Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/auth.js}"></script>
</head>
<body>
<header th:replace="~{fragments/topbar :: topbar}"></header>

<main class="page">
    <section class="page-heading">
        <p class="eyebrow">Відхилення</p>
        <h1>Історія аномалій</h1>
        <p>Тут зберігаються випадки, коли споживання пристроїв помітно відрізнялося від очікуваного.</p>
    </section>

    <section class="panel">
        <label class="list-filter">
            Група
            <select data-anomaly-household-filter>
                <option value="">Усі групи</option>
            </select>
        </label>

        <div class="table-responsive">
            <table class="table table-hover align-middle anomaly-table">
                <thead>
                <tr>
                    <th>Час</th>
                    <th>Пристрій</th>
                    <th>Фактично</th>
                    <th>Очікувалось</th>
                    <th>Відхилення</th>
                    <th>Тип</th>
                </tr>
                </thead>
                <tbody data-anomaly-list data-anomaly-limit="all">
                <tr>
                    <td colspan="6" class="empty-table">Аномалій поки не зафіксовано.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
