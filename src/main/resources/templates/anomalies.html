<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал аномалій | Energy Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/auth.js}"></script>
</head>
<body>
<header th:replace="~{fragments/topbar :: topbar}"></header>

<main class="page">
    <section class="page-heading">
        <p class="eyebrow">Контроль відхилень</p>
        <h1>Журнал аномалій</h1>
        <p>Таблиця буде заповнюватися після підключення MLService та телеметрії.</p>
    </section>

    <section class="panel">
        <div class="table-responsive">
            <table class="table table-hover align-middle anomaly-table">
                <thead>
                <tr>
                    <th>Час</th>
                    <th>Пристрій</th>
                    <th>Показник</th>
                    <th>Статус</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td colspan="4" class="empty-table">Аномалій поки не зафіксовано.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
