<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Energy Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/auth.js}"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<header th:replace="~{fragments/topbar :: topbar}"></header>

<main class="page">
    <section class="page-heading">
        <p class="eyebrow">Огляд системи</p>
        <h1>Dashboard</h1>
        <p>Тут буде відображатися поточне та прогнозоване енергоспоживання будинку.</p>
    </section>

    <section class="stats-grid" aria-label="Основні показники">
        <article class="metric-card">
            <span>Поточне споживання</span>
            <strong>-- кВт</strong>
        </article>
        <article class="metric-card">
            <span>Прогноз на 24 год</span>
            <strong>-- кВт·год</strong>
        </article>
        <article class="metric-card">
            <span>Активні пристрої</span>
            <strong>--</strong>
        </article>
        <article class="metric-card">
            <span>Аномалії сьогодні</span>
            <strong>--</strong>
        </article>
    </section>

    <section class="panel">
        <div class="panel-header">
            <h2>Графік споживання</h2>
            <span class="muted">Дані буде підключено пізніше</span>
        </div>
        <div class="chart-placeholder">
            <canvas id="consumptionChart" aria-label="Порожній графік споживання"></canvas>
        </div>
    </section>
</main>
</body>
</html>
