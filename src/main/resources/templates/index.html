<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моніторинг енергоспоживання</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/auth.js}"></script>
</head>
<body>
<header th:replace="~{fragments/topbar :: topbar}"></header>

<main class="page">
    <section class="empty-state">
        <p class="eyebrow">Домашня енергія під контролем</p>
        <h1>Система моніторингу та управління домашнім енергоспоживанням</h1>
        <p>
            Додаток збирає показники пристроїв, показує статистику споживання,
            фіксує аномалії та готує прогноз навантаження на наступні 24 години.
        </p>
        <div class="landing-actions" data-guest-nav>
            <a class="button" th:href="@{/register}">Почати роботу</a>
            <a class="button button-outline" th:href="@{/login}">Увійти</a>
        </div>
        <div class="landing-actions" data-user-nav hidden>
            <a class="button" th:href="@{/dashboard}">Перейти до dashboard</a>
            <a class="button button-outline" th:href="@{/anomalies}">Переглянути аномалії</a>
        </div>
    </section>
</main>
</body>
</html>
