<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід | Energy Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/auth.js(v=2)}"></script>
</head>
<body data-auth-page="guest-only">
<header th:replace="~{fragments/topbar :: topbar}"></header>

<main class="auth-page">
    <section class="auth-panel">
        <p class="eyebrow">Авторизація</p>
        <h1>Вхід</h1>
        <form class="auth-form" data-auth-form="login">
            <label>
                Логін
                <input type="text" name="username" autocomplete="username" required>
            </label>
            <label>
                Пароль
                <input type="password" name="password" autocomplete="current-password" required>
            </label>
            <p class="form-message" data-form-message></p>
            <button class="button" type="submit">Увійти</button>
        </form>
        <p class="auth-link">Ще немає акаунта? <a th:href="@{/register}">Зареєструватися</a></p>
    </section>
</main>
</body>
</html>
