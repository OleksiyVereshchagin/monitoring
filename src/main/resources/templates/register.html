<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація | Energy Monitor</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/auth.js}"></script>
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">Energy Monitor</a>
    <nav class="nav">
        <a th:href="@{/login}">Увійти</a>
    </nav>
</header>

<main class="auth-page">
    <section class="auth-panel">
        <p class="eyebrow">Новий користувач</p>
        <h1>Реєстрація</h1>
        <form class="auth-form" data-auth-form="register">
            <label>
                Логін
                <input type="text" name="username" autocomplete="username" minlength="3" maxlength="50" required>
            </label>
            <label>
                Email
                <input type="email" name="email" autocomplete="email" required>
            </label>
            <label>
                Пароль
                <input type="password" name="password" autocomplete="new-password" minlength="6" required>
            </label>
            <p class="form-message" data-form-message></p>
            <button class="button" type="submit">Зареєструватися</button>
        </form>
        <p class="auth-link">Вже маєте акаунт? <a th:href="@{/login}">Увійти</a></p>
    </section>
</main>
</body>
</html>
